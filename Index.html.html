   tu propia pieza. La pieza se forja de verdad, visualmente, con el tiempo:
   metal en bruto -> al rojo -> templado -> forjado -> hoja legendaria.
   Todo se calcula localmente a partir de tus propios registros. */

function forgeTierFor(golpes) {
  let tier = FORGE_TIERS[0];
  for (const t of FORGE_TIERS) if (golpes >= t.min) tier = t;
  return tier;
}

// ¿Se cumplió el plan ese día? true / false / null (sin datos suficientes para juzgarlo)
function computeDayForged({ mealsChecked, dayMenu, scheduledMuscle, exercisesDoneForDay, exercisesTotalForDay }) {
  const plannedMeals = MEALS.filter((m) => dayMenu && dayMenu[m]);
  const mealsOk = plannedMeals.length === 0 ? true : plannedMeals.every((m) => mealsChecked && mealsChecked[m]);
  const trainingOk = !scheduledMuscle ? true : exercisesTotalForDay > 0 && exercisesDoneForDay >= Math.ceil(exercisesTotalForDay * 0.75);
  return mealsOk && trainingOk;
}

/* ---------------- HELPERS ---------------- */
function calcTDEE({ sex, age, height, weight, activity, bodyFatPct, frame }) {
  let bmr;
  if (bodyFatPct && bodyFatPct > 0 && bodyFatPct < 70) {
    const leanMass = weight * (1 - bodyFatPct / 100);
    bmr = 370 + 21.6 * leanMass; // Katch-McArdle: usa masa magra, no el peso total
  } else {
    bmr = sex === "mujer"
      ? 10 * weight + 6.25 * height - 5 * age - 161
      : 10 * weight + 6.25 * height - 5 * age + 5; // Mifflin-St Jeor
  }
  const frameFactor = frame === "ancha" ? 1.03 : frame === "estrecha" ? 0.97 : 1;
  const factors = { sedentario: 1.2, ligero: 1.375, moderado: 1.55, activo: 1.725, atleta: 1.9 };
  return Math.round(bmr * frameFactor * (factors[activity] || 1.375));
}

function calcMacros(tdee, goal, weight, bodyFatPct) {
  let kcal = tdee;
  if (goal === "perder") kcal = Math.round(tdee * 0.8);
  if (goal === "ganar") kcal = Math.round(tdee * 1.12);
  const leanMass = bodyFatPct && bodyFatPct > 0 && bodyFatPct < 70 ? weight * (1 - bodyFatPct / 100) : weight;
  const proteinPerKg = bodyFatPct ? (goal === "perder" ? 2.4 : 2.2) : (goal === "perder" ? 2.2 : 2.0);
  const protein = Math.round(leanMass * proteinPerKg);
  const fat = Math.round((kcal * 0.25) / 9);
  const carbsKcal = kcal - protein * 4 - fat * 9;
  const carbs = Math.max(0, Math.round(carbsKcal / 4));
  return { kcal, protein, fat, carbs };
}

function buildWeekMenu(likedIds, dislikedIds) {
  const liked = new Set(likedIds);
  const disliked = new Set(dislikedIds);
  const pool = (meal) => {
    let items = RECIPES.filter((r) => r.meal === meal && !r.foodIds.some((id) => disliked.has(id)));
    if (items.length === 0) items = RECIPES.filter((r) => r.meal === meal); // si se descarta todo, no dejamos la comida vacía
    const preferred = items.filter((r) => r.foodIds.some((id) => liked.has(id)));
    return preferred.length >= 2 ? preferred : items;
  };
  const menu = {};
  const recentByMeal = { desayuno: [], comida: [], cena: [], snack: [] };
  DAYS.forEach((day) => {
    menu[day] = {};
    MEALS.forEach((meal) => {
      const items = pool(meal);
      if (items.length === 0) { menu[day][meal] = null; return; }
      // evita repetir la misma receta que en los 2 días anteriores si hay alternativas
      const recent = recentByMeal[meal];
      const fresh = items.filter((r) => !recent.includes(r.id));
      const choices = fresh.length ? fresh : items;
      const picked = choices[Math.floor(Math.random() * choices.length)];
      menu[day][meal] = picked;
      recent.push(picked.id);
      if (recent.length > 2) recent.shift();
    });
  });
  return menu;
}

/* ---------------- STORAGE HOOK (localStorage real del navegador) ---------------- */
const STORAGE_PREFIX = "forja:";

function usePersisted(key, initial) {
  const [value, setValue] = useState(initial);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_PREFIX + key);
      if (raw) setValue(JSON.parse(raw));
    } catch (e) { console.error("Error leyendo localStorage:", e); }
    setLoaded(true);
  }, [key]);
  const persist = useCallback(async (next) => {
    setValue(next);
    try {
      localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(next));
      return true;
    } catch (e) {
      console.error("Error guardando en localStorage:", e);
      return false;
    }
  }, [key]);
  return [value, persist, loaded];
}

/* ============================================================

function LaForja({ tier, golpes, streak }) {
  const nextTier = FORGE_TIERS.find((t) => t.min > golpes);
  const prevMin = FORGE_TIERS[FORGE_TIERS.indexOf(tier)].min;
  const span = nextTier ? nextTier.min - prevMin : 1;
  const pct = nextTier ? Math.min(1, (golpes - prevMin) / span) : 1;
  const sparkPositions = [
    { x: 96, y: 58, delay: 0 }, { x: 130, y: 62, delay: 0.4 }, { x: 70, y: 66, delay: 0.8 },
    { x: 112, y: 50, delay: 1.2 }, { x: 84, y: 48, delay: 1.6 }, { x: 146, y: 70, delay: 0.2 },
  ].slice(0, tier.sparks);

  return (
    <div className="relative flex flex-col items-center py-2">
      <style>{`
        @keyframes forgeGlow { 0%,100% { filter: drop-shadow(0 0 4px ${tier.glow}66); } 50% { filter: drop-shadow(0 0 14px ${tier.glow}); } }
        @keyframes forgeSpark { 0% { opacity: 0; transform: translateY(0) scale(0.4); } 15% { opacity: 1; } 100% { opacity: 0; transform: translateY(-26px) scale(1); } }
        @keyframes forgeShine { 0% { transform: translateX(-60px) skewX(-20deg); } 100% { transform: translateX(160px) skewX(-20deg); } }
        .forge-piece { animation: ${tier.min > 0 ? "forgeGlow 2.4s ease-in-out infinite" : "none"}; }
        .forge-spark { animation: forgeSpark 1.8s ease-in infinite; }
        .forge-shine { animation: forgeShine 2.6s ease-in-out infinite; }
      `}</style>
      <svg width="216" height="130" viewBox="0 0 216 130">
        <defs>
          <linearGradient id="pieceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stopColor={tier.base} />
            <stop offset="100%" stopColor={tier.glow} />
          </linearGradient>
          <clipPath id="pieceClip"><rect x="60" y="46" width="96" height="20" rx="6" /></clipPath>
        </defs>
        {/* base del yunque */}
        <path d="M50 118 L166 118 L156 100 L60 100 Z" fill="#242617" />

            </g>

        {sparkPositions.map((s, i) => (

function TabEntreno({ workoutLog, setWorkoutLog, todayName, schedule }) {
  const [group, setGroup] = useState(schedule[todayName] || MUSCLE_GROUPS[0]);
  useEffect(() => { setGroup(schedule[todayName] || MUSCLE_GROUPS[0]); }, [todayName]); // eslint-disable-line
  const dateKey = new Date().toISOString().slice(0, 10);
  const doneSet = new Set(workoutLog[dateKey] || []);

  const toggleDone = (exId) => {
    const arr = new Set(workoutLog[dateKey] || []);
    arr.has(exId) ? arr.delete(exId) : arr.add(exId);
    setWorkoutLog({ ...workoutLog, [dateKey]: [...arr] });
  };

  return (
    <div className="space-y-4 pb-4">
      <div className="flex gap-2 overflow-x-auto pb-1">
        {MUSCLE_GROUPS.map((g) => (
          <Pill key={g} active={group === g} onClick={() => setGroup(g)} tone="bulk">{g}</Pill>
        ))}
      </div>
      <p style={{ fontSize: 12, color: C.muted }}>Hoy ({todayName}) toca <span style={{ color: C.gold }}>{schedule[todayName] || "descanso"}</span> según tu plan semanal.</p>

      <div className="space-y-3">
        {EXERCISES[group].map((ex) => {
          const done = doneSet.has(ex.id);
          return (
            <Card key={ex.id} style={{ borderColor: done ? C.moss : C.line }}>
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0 flex-1">
                  <h4 style={{ ...F_HEAD, color: C.cream, letterSpacing: 0.5 }}>{ex.name}</h4>
                  <p style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{ex.series} series × {ex.reps} reps</p>
                  <p style={{ fontSize: 14, color: C.muted, marginTop: 8 }}>{ex.desc}</p>
                  <a href={ytLink(ex.name)} target="_blank" rel="noopener noreferrer"
                    className="inline-flex items-center gap-1.5 mt-3 rounded-full px-3 py-1.5"
                    style={{ fontSize: 12, fontWeight: 700, color: C.gold, border: `1px solid ${C.gold}66` }}>
                    <Play size={12} fill={C.gold} color={C.gold} /> Ver vídeo explicativo
                  </a>
                </div>
                <button onClick={() => toggleDone(ex.id)}
                  className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 transition-transform active:scale-90"
                  style={{ background: done ? `linear-gradient(to bottom, ${C.mossLight}, ${C.mossDark})` : "transparent", border: `1px solid ${done ? "transparent" : C.line}` }}>
                  {done ? <Check size={16} style={{ color: C.bg }} /> : <span style={{ color: C.mutedDark, fontSize: 12 }}>✓</span>}
                </button>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   TAB: PROGRESO
============================================================ */
function TabProgreso({ progress, setProgress, fastingLog }) {
  const [weight, setWeight] = useState("");
  const sorted = [...progress].sort((a, b) => a.date.localeCompare(b.date));
  const addEntry = () => {
    const w = parseFloat(weight);
    if (!w) return;
    const today = new Date().toISOString().slice(0, 10);
    const filtered = progress.filter((p) => p.date !== today);
    setProgress([...filtered, { date: today, weight: w }]);
    setWeight("");
  };

  const max = Math.max(...sorted.map((p) => p.weight), 1);
  const min = Math.min(...sorted.map((p) => p.weight), max);
  const range = max - min || 1;

  const recentFasts = Object.entries(fastingLog || {})
    .filter(([, v]) => v && v.active)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .slice(0, 10);

  return (
    <div className="space-y-4 pb-4">
      <Card>
        <div className="flex items-center gap-2 mb-3">
          <Scale size={16} style={{ color: C.gold }} />
          <h3 style={{ ...F_HEAD, color: C.cream, letterSpacing: 0.5 }}>Registrar peso de hoy</h3>
        </div>
        <div className="flex gap-2">
          <input type="number" inputMode="decimal" value={weight} onChange={(e) => setWeight(e.target.value)}
            placeholder="Ej. 78.5" className="flex-1 rounded-xl px-3 py-2 outline-none"
            style={{ background: C.input, border: `1px solid ${C.line}`, color: C.cream, fontSize: 14 }} />
          <button onClick={addEntry} className="px-4 rounded-xl" style={{ background: C.gold, color: C.bg, fontSize: 14, fontWeight: 700 }}>Guardar</button>
        </div>
      </Card>

      <Card>
        <div className="flex items-center gap-2 mb-4">
          <TrendingUp size={16} style={{ color: C.gold }} />
          <h3 style={{ ...F_HEAD, color: C.cream, letterSpacing: 0.5 }}>Evolución del peso</h3>
        </div>
        {sorted.length < 2 ? (
          <p style={{ fontSize: 14, color: C.muted }}>Registra al menos dos días para ver tu evolución.</p>
        ) : (
          <svg viewBox="0 0 300 120" className="w-full h-32">
            <polyline
              fill="none" stroke={C.mossLight} strokeWidth="2.5"
              points={sorted.map((p, i) => {
                const x = (i / (sorted.length - 1)) * 280 + 10;
                const y = 100 - ((p.weight - min) / range) * 80;
                return `${x},${y}`;
              }).join(" ")}
            />
            {sorted.map((p) => {
              const i = sorted.indexOf(p);
              const x = (i / (sorted.length - 1)) * 280 + 10;
              const y = 100 - ((p.weight - min) / range) * 80;
              return <circle key={p.date} cx={x} cy={y} r="3" fill={C.gold} />;
            })}
          </svg>
        )}
        {sorted.length > 0 && (
          <div className="flex justify-between mt-2" style={{ fontSize: 12, color: C.muted }}>
            <span>{sorted[0].date}</span>
            <span style={{ color: C.gold, fontWeight: 700 }}>{sorted[sorted.length - 1].weight} kg</span>
            <span>{sorted[sorted.length - 1].date}</span>
          </div>
        )}
      </Card>

      <Card>
        <div className="flex items-center gap-2 mb-3">
          <Clock size={16} style={{ color: C.gold }} />
          <h3 style={{ ...F_HEAD, color: C.cream, letterSpacing: 0.5 }}>Ayunos recientes</h3>
        </div>
        {recentFasts.length === 0 ? (
          <p style={{ fontSize: 14, color: C.muted }}>Todavía no has marcado ningún día de ayuno.</p>
        ) : (
          <div className="space-y-1.5">
            {recentFasts.map(([date, v]) => (
              <div key={date} className="flex items-center justify-between rounded-xl px-3 py-2" style={{ background: C.input }}>
                <span style={{ fontSize: 13, color: C.cream }}>{date}</span>
                <span style={{ fontSize: 13, color: C.gold, fontWeight: 700 }}>{v.hours ? `${v.hours}h` : "sin horas"}</span>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

            <textarea readOnly value={backupText} onFocus={(e) => e.target.select()}
              className="w-full rounded-xl p-2 outline-none" rows={4}
              style={{ background: C.input, border: `1px solid ${C.line}`, color: C.cream, fontSize: 11, fontFamily: "monospace" }} />
          </div>
        )}
        <button onClick={() => setShowRestore(!showRestore)} className="w-full py-2.5 rounded-xl" style={{ border: `1px solid ${C.line}`, color: C.muted, fontSize: 14, fontWeight: 600 }}>
          {showRestore ? "Ocultar restauración" : "Restaurar desde un texto guardado"}
        </button>
        {showRestore && (
          <div className="mt-2">
            <textarea value={pasteValue} onChange={(e) => setPasteValue(e.target.value)} placeholder="Pega aquí el texto que copiaste antes…"
              className="w-full rounded-xl p-2 outline-none" rows={4}
              style={{ background: C.input, border: `1px solid ${C.line}`, color: C.cream, fontSize: 12 }} />
            <button onClick={async () => {
                setBackupState("restoring");
                const ok = await importData(pasteValue);
                setBackupState(ok ? "restored" : "error");
                setTimeout(() => setBackupState((s) => (s === "restored" ? null : s)), 2500);
              }} className="w-full mt-2 py-2.5 rounded-xl"
              style={{ background: TONE_GRADIENTS.gold, color: C.bg, ...F_HEAD, letterSpacing: 0.5, fontSize: 14 }}>
              {backupState === "restoring" ? "Restaurando…" : "Restaurar estos datos"}
            </button>
            {backupState === "restored" && <p style={{ fontSize: 12, color: C.mossLight, textAlign: "center", marginTop: 8 }}>✓ Datos restaurados</p>}
            {backupState === "error" && <p style={{ fontSize: 12, color: C.rustLight, textAlign: "center", marginTop: 8 }}>El texto no es válido. Comprueba que lo has pegado completo.</p>}
          </div>
        )}
      </Card>
    </div>
  );
}

/* ============================================================
   APP ROOT
============================================================ */
function App() {
  const [tab, setTab] = useState("hoy");
  const todayName = DAYS[(new Date().getDay() + 6) % 7];

  const [profile, setProfile, profileLoaded] = usePersisted("perfil", {
    age: 32, height: 175, weight: 78, sex: "hombre", activity: "ligero", goal: "perder",
    frame: "media", bodyFatPct: "", muscleMassPct: "",
  });
  const [prefs, setPrefs, prefsLoaded] = usePersisted("preferencias_comida", { liked: [], disliked: [] });
  const [menu, setMenu, menuLoaded] = usePersisted("menu_semanal", null);
  const [dayLog, setDayLog] = usePersisted("registro_comidas", {});
  const [workoutLog, setWorkoutLog] = usePersisted("registro_entreno", {});
  const [progress, setProgress] = usePersisted("progreso_peso", []);
  const [schedule, setSchedule, scheduleLoaded] = usePersisted("horario_entreno", DEFAULT_SCHEDULE);
  const [fastingLog, setFastingLog] = usePersisted("registro_ayuno", {});
  const [forgeLog, setForgeLog] = usePersisted("registro_forja", {});

  const ready = profileLoaded && prefsLoaded && menuLoaded && scheduleLoaded;
  const todayDateKey = new Date().toISOString().slice(0, 10);

  useEffect(() => {
    if (ready && !menu) setMenu(buildWeekMenu(prefs.liked, prefs.disliked));
  }, [ready, menu]); // eslint-disable-line

  // Recalcula si hoy cuenta como "día forjado" cada vez que cambian los registros del día
  useEffect(() => {
    if (!ready || !menu) return;
    const scheduledMuscle = schedule[todayName];
    const exercisesTotalForDay = scheduledMuscle ? EXERCISES[scheduledMuscle].length : 0;
    const doneSet = workoutLog[todayDateKey] || [];
    const exercisesDoneForDay = scheduledMuscle ? doneSet.filter((id) => EXERCISES[scheduledMuscle].some((e) => e.id === id)).length : 0;
    const forged = computeDayForged({
      mealsChecked: dayLog[todayName]?.mealsChecked,
      dayMenu: menu[todayName],
      scheduledMuscle,
      exercisesDoneForDay,
      exercisesTotalForDay,
    });
    if (forgeLog[todayDateKey] !== forged) {
      setForgeLog({ ...forgeLog, [todayDateKey]: forged });
    }
  }, [ready, menu, schedule, workoutLog, dayLog, todayName, todayDateKey]); // eslint-disable-line

  const forgeStats = useMemo(() => {
    const golpes = Object.values(forgeLog).filter(Boolean).length;
    let streak = 0;
    for (let i = 0; i < 90; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      if (forgeLog[key]) { streak++; continue; }
      break;
    }
    return { golpes, streak, tier: forgeTierFor(golpes) };
  }, [forgeLog]);

  const regenMenu = () => setMenu(buildWeekMenu(prefs.liked, prefs.disliked));

  const exportData = () => JSON.stringify({
    v: 1, profile, prefs, menu, dayLog, workoutLog, progress, schedule, fastingLog, forgeLog,
  });

  const importData = async (text) => {
    try {
      const d = JSON.parse(text);
      if (!d || typeof d !== "object") return false;
      const tasks = [];
      if (d.profile) tasks.push(setProfile(d.profile));
      if (d.prefs) tasks.push(setPrefs(d.prefs));
      if (d.menu) tasks.push(setMenu(d.menu));
      if (d.dayLog) tasks.push(setDayLog(d.dayLog));
      if (d.workoutLog) tasks.push(setWorkoutLog(d.workoutLog));
      if (d.progress) tasks.push(setProgress(d.progress));
      if (d.schedule) tasks.push(setSchedule(d.schedule));
      if (d.fastingLog) tasks.push(setFastingLog(d.fastingLog));
      if (d.forgeLog) tasks.push(setForgeLog(d.forgeLog));
      await Promise.all(tasks);
      return true;
    } catch (e) {
      console.error("Error al restaurar:", e);
      return false;
    }
  };

  const TABS = [
    { id: "hoy", label: "Hoy", icon: Sparkles },
    { id: "nutricion", label: "Nutrición", icon: Salad },
    { id: "entreno", label: "Entreno", icon: Dumbbell },
    { id: "progreso", label: "Progreso", icon: TrendingUp },
    { id: "perfil", label: "Perfil", icon: User },
  ];

  if (!ready) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: C.bg }}>
        <p style={{ color: C.muted, fontSize: 14 }}>Cargando…</p>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col relative" style={{ background: `radial-gradient(120% 60% at 50% -10%, ${C.glow} 0%, ${C.bg} 55%), ${C.bg}`, fontFamily: "'Inter', sans-serif" }}>
      <style>{`
        ${FONT_IMPORT}
        @keyframes tabIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .tab-enter { animation: tabIn .28s cubic-bezier(.4,0,.2,1); }
        input::placeholder { color: ${C.mutedDark}; }
      `}</style>

      <header className="px-4 pt-6 pb-3 sticky top-0 z-10" style={{ background: `${C.bg}E6`, backdropFilter: "blur(10px)", borderBottom: `1px solid #242617` }}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{ background: `linear-gradient(135deg, ${C.goldLight}, ${C.rustDark})`, boxShadow: "0 2px 12px -2px rgba(217,164,65,0.5)" }}>
              <Dumbbell size={17} style={{ color: C.bg }} />
            </div>
            <div>
              <h1 style={{ ...F_DISPLAY, fontSize: 20, color: C.cream, letterSpacing: 0.5, lineHeight: 1 }}>FORJA</h1>
              <p style={{ fontSize: 9, color: C.mutedDark, letterSpacing: 2, textTransform: "uppercase", marginTop: 2 }}>Nutrición + Entreno</p>
            </div>
          </div>
          {forgeStats.streak > 0 && (
            <div className="flex items-center gap-1 rounded-full pl-2 pr-2.5 py-1" style={{ background: `${C.rustLight}26`, border: `1px solid ${C.rustLight}66` }}>
              <Flame size={13} style={{ color: "#E08A6D" }} fill="#E08A6D" />
              <span style={{ fontSize: 12, fontWeight: 700, color: "#E08A6D" }}>{forgeStats.streak}</span>
            </div>
          )}
        </div>
      </header>

      <main key={tab} className="tab-enter flex-1 px-4 pt-4 overflow-y-auto pb-24 max-w-md mx-auto w-full relative" style={{ zIndex: 1 }}>
        {tab === "hoy" && <TabHoy profile={profile} menu={menu || {}} dayLog={dayLog} setDayLog={setDayLog} todayName={todayName} schedule={schedule} fastingLog={fastingLog} setFastingLog={setFastingLog} forgeStats={forgeStats} />}
        {tab === "nutricion" && <TabNutricion prefs={prefs} setPrefs={setPrefs} menu={menu || {}} regenMenu={regenMenu} />}
        {tab === "entreno" && <TabEntreno workoutLog={workoutLog} setWorkoutLog={setWorkoutLog} todayName={todayName} schedule={schedule} />}
        {tab === "progreso" && <TabProgreso progress={progress} setProgress={setProgress} fastingLog={fastingLog} />}
        {tab === "perfil" && <TabPerfil profile={profile} setProfile={setProfile} schedule={schedule} setSchedule={setSchedule} exportData={exportData} importData={importData} />}
      </main>

      <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto w-full z-10" style={{ background: `${C.navBg}F2`, backdropFilter: "blur(10px)", borderTop: `1px solid ${C.lineSoft}` }}>
        <div className="flex justify-around py-2 px-1">
          {TABS.map(({ id, label, icon: Icon }) => {
            const active = tab === id;
            return (
              <button key={id} onClick={() => setTab(id)} className="flex flex-col items-center gap-1 px-2 py-1.5 flex-1 relative">
                <div className="absolute rounded-full transition-opacity duration-200" style={{ left: 8, right: 8, top: -8, height: 3, opacity: active ? 1 : 0, background: `linear-gradient(to right, ${C.goldLight}, ${C.rust})` }} />
                <Icon size={19} style={{ color: active ? C.gold : C.navInactive, transform: active ? "scale(1.1)" : "scale(1)", transition: "all .15s" }} />
                <span style={{ fontSize: 10, fontWeight: 500, color: active ? C.gold : C.navInactive }}>{label}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
